<!DOCTYPE html>
<html>

<head>
<title>Quiz Result</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Quiz Result</h1>

<h2 id="score"></h2>

<button onclick="playAgain()">
Play Again
</button>

</div>

<script>

let score = localStorage.getItem("score")

document.getElementById("score").innerHTML =
"Your Score: " + score

function playAgain(){

location.href="index.html"

}

</script>

</body>
</html>
