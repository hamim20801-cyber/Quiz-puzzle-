<!DOCTYPE html>
<html>

<head>
<title>Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2 id="timer">Time: 20</h2>

<h3 id="question"></h3>

<div id="choices">

<button onclick="checkChoice(0)" id="a"></button>
<button onclick="checkChoice(1)" id="b"></button>
<button onclick="checkChoice(2)" id="c"></button>
<button onclick="checkChoice(3)" id="d"></button>

</div>

<div id="textAnswer" style="display:none">

<input id="answerInput" placeholder="Type your answer">

<button onclick="submitAnswer()">Submit</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
